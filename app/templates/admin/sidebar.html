<div class="admin-sidebar">
  <div style="font-family:var(--font-sans);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);padding:0 0.5rem;margin-bottom:0.5rem;">Управление</div>
  {% set items = [
    ('/admin', 'Дашборд', '<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>'),
    ('/admin/users', 'Пользователи', '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>'),
    ('/admin/books', 'Книги', '<path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>'),
    ('/admin/reviews', 'Отзывы', '<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>'),
    ('/admin/reports', 'Жалобы', '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'),
  ] %}
  {% for href, label, icon_path in items %}
  <a href="{{ href }}" class="admin-nav-item {% if request.url.path == href or (href != '/admin' and href in request.url.path) %}active{% endif %}">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">{{ icon_path }}</svg>
    {{ label }}
  </a>
  {% endfor %}
  <div style="border-top:1px solid var(--border-light);margin:0.75rem 0;"></div>
  <a href="/" class="admin-nav-item">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    На сайт
  </a>
</div>
